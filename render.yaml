services:
  - type: web
    name: dwai-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: theking196/dwai-mobile-agent
      - key: PORT
        value: 10000
    healthCheckPath: /health
